<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelamb Gallery Portal</title>
    <style>
        body { background: #f0f2f5; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        .nav { background: #1a1a1a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .nav .brand { color: #fff; font-size: 24px; font-weight: bold; }
        .nav .brand span { color: #e60000; }
        .search-container input { padding: 12px 25px; border-radius: 30px; border: none; width: 350px; outline: none; font-size: 16px; }
        .container { padding: 20px; }
        @media (max-width: 768px) { .nav { flex-direction: column; gap: 15px; } .search-container input { width: 100%; } }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="brand">Flyer<span>design</span></div>
        <div class="search-container">
            <input type="text" placeholder="Search across all galleries..." id="globalSearchInput">
        </div>
    </nav>

    <div class="container">
        <div id="Neelamb-gallery"></div>
        <div id="Manojgas-gallery"></div>
        <div id="other-gallery"></div>
    </div>

    <script src="gdrive-gallery.js"></script>

    <script>
        /**
         * MULTI-FUNCTION CONTROLLER (Enhanced)
         */
        const multiFunctionController = {
            config: [
                { id: "Neelamb-gallery", folder: "1dhTXfPliMkFSbboXXvjjfqQCDbxEItS4", title: "Neelamb Gallery" },
                { id: "Manojgas-gallery", folder: "1lYFnpnYWMykrFShv_mbd7Ypu7AnS5Dl0", title: "Manojgas Gallery" },
                { id: "other-gallery", folder: "1bFN79McWlR5nsOWWKnj5yRdrWr6ZOfwH", title: "Other Gallery" }
            ],

            init() {
                this.config.forEach(item => {
                    new NeelambGallery({
                        containerId: item.id,
                        folderId: item.folder,
                        title: item.title,
                        allowUpload: true
                    });
                });
                this.attachEvents();
            },

            attachEvents() {
                const searchInput = document.getElementById('globalSearchInput');
                searchInput.addEventListener('keyup', (e) => this.globalSearch(e.target.value));
            },

            globalSearch(val) {
                if (window.neelambInstances) {
                    window.neelambInstances.forEach(inst => {
                        if (typeof inst.applyGlobalSearch === 'function') {
                            inst.applyGlobalSearch(val);
                        }
                    });
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => multiFunctionController.init());
    </script>
</body>
</html>
